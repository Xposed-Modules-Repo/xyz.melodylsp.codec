name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Prepare artifact name
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')
          APK_NAME="MelodyCodecTweaker-${SHORT_SHA}-${DATE}.apk"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Sign APK
        uses: ilharp/sign-android-release@v2
        id: sign
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename signed APK
        run: |
          SIGNED=$(find app/build/outputs/apk/release -name '*-signed.apk' | head -1)
          if [ -z "$SIGNED" ]; then
            echo "No signed APK found, falling back to unsigned"
            SIGNED=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          fi
          mv "$SIGNED" "app/build/outputs/apk/release/${{ steps.meta.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.apk_name }}
          path: app/build/outputs/apk/release/${{ steps.meta.outputs.apk_name }}
          retention-days: 30
